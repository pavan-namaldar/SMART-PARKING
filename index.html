<!DOCTYPE html>
<html>
<head>
    <title>Parking Management - LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); 
            color: white; 
            text-align: center; 
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #38bdf8, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px #38bdf8); }
            to { filter: drop-shadow(0 0 20px #60a5fa); }
        }
        #db-status {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 40px;
            perspective: 1000px;
        }
        .card { 
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            border: 2px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        .card:hover::before { left: 100%; }
        .card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .occupied { 
            border-color: #ef4444; 
            box-shadow: 0 0 30px rgba(239,68,68,0.4);
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .vacant { 
            border-color: #22c55e; 
            box-shadow: 0 0 30px rgba(34,197,94,0.4);
            animation: bounce 0.6s ease;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .status { 
            font-size: 28px; 
            font-weight: 700; 
            margin: 20px 0; 
            text-shadow: 0 0 10px currentColor;
        }
        .v-box { 
            background: linear-gradient(45deg, #38bdf8, #60a5fa);
            padding: 15px;
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(56,189,248,0.4);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #f8fafc;
        }
        input { 
            padding: 12px 15px;
            border-radius: 10px; 
            border: 2px solid #475569;
            width: 80%;
            margin-bottom: 15px;
            font-size: 1rem;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        input::placeholder {
            color: #94a3b8;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56,189,248,0.3);
            transform: scale(1.02);
        }
        button { 
            background: linear-gradient(45deg, #38bdf8, #60a5fa);
            border: none; 
            padding: 12px 25px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(56,189,248,0.4);
            position: relative;
            overflow: hidden;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(56,189,248,0.6);
        }
        button:active {
            transform: translateY(-1px);
        }
        .icon {
            margin-right: 8px;
        }
        .available {
            color: #22c55e;
            font-size: 1.2rem;
            font-weight: 500;
        }
        .error-msg {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 5px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .debug {
            font-size: 0.8rem;
            color: #e5e7eb;
            margin-top: 5px;
            opacity: 0.8;
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; gap: 20px; }
            .card { width: 90%; max-width: 400px; }
        }
    </style>
</head>
<body>
    <h1><i class="fas fa-car icon"></i>Parking System Live Dashboard<i class="fas fa-car icon"></i></h1>
    <p id="db-status">Checking Database Connection...<i class="fas fa-sync-alt fa-spin"></i></p>

    <div class="container">
        <div class="card" id="card-1">
            <h2><i class="fas fa-parking"></i> Slot 01</h2>
            <div id="s1-status" class="status">LOADING...</div>
            <div id="s1-info"></div>
        </div>
        <div class="card" id="card-2">
            <h2><i class="fas fa-parking"></i> Slot 02</h2>
            <div id="s2-status" class="status">LOADING...</div>
            <div id="s2-info"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://pvvyhnqpbljjpqdctkqt.supabase.co";
        const SB_KEY = "sb_publishable_WL035UG9I_XxLaXZl2QmHw_Y1_Oppr8";
        
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // GeeksforGeeks-style regex for Indian plates (UP 50 BY 1998, MH-05-DL-9023, MH 05 S 9954, MH05DL9023 etc.) [web:2]
        const indianVehicleRegex = /^[A-Z]{2}[\s-]{0,1}[0-9]{2}[\s-]{0,1}[A-Z]{1,2}[\s-]{0,1}[0-9]{4}$/i;

        function isValidIndianVehicleNumber(num) {
            const cleaned = num.replace(/\s+/g, ' ').trim();
            console.log("Checking plate:", cleaned);
            return indianVehicleRegex.test(cleaned);
        }

        async function updateDashboard() {
            document.getElementById('db-status').innerHTML = `Last Sync: ${new Date().toLocaleTimeString()} <i class="fas fa-sync-alt"></i>`;

            for (let i = 1; i <= 2; i++) {
                const { data, error } = await supabase
                    .from('parking_logs')
                    .select('*')
                    .eq('slot', i)
                    .order('id', { ascending: false })
                    .limit(1);

                if (error) {
                    console.error("Error fetching slot " + i, error);
                    continue;
                }

                const statusEl = document.getElementById(`s${i}-status`);
                const infoEl = document.getElementById(`s${i}-info`);
                const cardEl = document.getElementById(`card-${i}`);

                if (data && data.length > 0) {
                    const latest = data[0];
                    console.log("Latest row for slot", i, latest);

                    if (latest.status === "Occupied") {
                        statusEl.innerHTML = '<i class="fas fa-times-circle"></i> OCCUPIED';
                        cardEl.className = "card occupied";
                        
                        if (!latest.vehicle_number || latest.vehicle_number === "Waiting..." || !isValidIndianVehicleNumber(latest.vehicle_number)) {
                            infoEl.innerHTML = `
                                <input type="text" id="input-${i}" placeholder="e.g. TS 09 FA 1234" maxlength="20">
                                <div id="error-${i}" class="error-msg" style="display:none;"></div>
                                <div id="debug-${i}" class="debug"></div>
                                <button onclick="savePlate(${i}, ${latest.id})">
                                    <i class="fas fa-save icon"></i>SAVE PLATE
                                </button>
                            `;
                        } else {
                            infoEl.innerHTML = `<div class="v-box"><i class="fas fa-car-side"></i> ${latest.vehicle_number.toUpperCase()}</div>`;
                        }
                    } else {
                        statusEl.innerHTML = '<i class="fas fa-check-circle"></i> VACANT';
                        cardEl.className = "card vacant";
                        infoEl.innerHTML = '<div class="available"><i class="fas fa-check-circle"></i> Available</div>';
                    }
                } else {
                    statusEl.innerText = "NO DATA";
                    infoEl.innerHTML = '<div style="color:#94a3b8;">Empty Table</div>';
                }
            }
        }

        async function savePlate(slotId, rowId) {
            const input = document.getElementById(`input-${slotId}`);
            const errorEl = document.getElementById(`error-${slotId}`);
            const debugEl = document.getElementById(`debug-${slotId}`);
            let val = input.value.toUpperCase();

            val = val.replace(/\s+/g, ' ').trim();
            debugEl.textContent = "You typed: '" + val + "'";

            if (!val) {
                errorEl.textContent = "Enter vehicle number!";
                errorEl.style.display = 'block';
                input.focus();
                return;
            }

            if (!isValidIndianVehicleNumber(val)) {
                errorEl.textContent = "Invalid vehicle number! Example: TS 09 FA 1234";
                errorEl.style.display = 'block';
                input.focus();
                return;
            }

            errorEl.style.display = 'none';

            const { error } = await supabase
                .from('parking_logs')
                .update({ vehicle_number: val })
                .eq('id', rowId);

            if (error) {
                alert("Error: " + error.message);
            } else {
                input.value = '';
                updateDashboard();
            }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
